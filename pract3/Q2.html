<!DOCTYPE html>
<html>
<head>
    <title>Person JSON</title>
</head>
<body>

<script>
    // JSON object Person with default values
    var person = {
        "name": "Amit",
        "age": 30,
        "city": "Mumbai"
    };

    // Display
    document.write("Name: " + person.name + "<br>");
    document.write("Age: " + person.age + "<br>");
    document.write("City: " + person.city);
</script>

</body>
</html>
