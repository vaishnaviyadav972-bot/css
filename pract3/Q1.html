<!DOCTYPE html>
<html>
<head>
    <title>Employee JSON</title>
</head>
<body>

<script>
    // JSON object Employee
    var employee = {
        "name": "Rahul",
        "age": 25
    };

    // Display
    document.write("Employee Name: " + employee.name + "<br>");
    document.write("Employee Age: " + employee.age);
</script>

</body>
</html>
