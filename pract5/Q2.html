<!DOCTYPE html>
<html ng-app="examApp">
<head>
    <title>Student Exam Registration</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
</head>
<body ng-controller="examCtrl">

<h2>Student Exam Registration</h2>

<form name="examForm">
    
    Student Name:
    <input type="text" ng-model="student.name" required><br><br>

    Roll No:
    <input type="number" ng-model="student.roll" required><br><br>

    Subject:
    <select ng-model="student.subject" required>
        <option value="">Select</option>
        <option>Maths</option>
        <option>Physics</option>
        <option>Chemistry</option>
    </select><br><br>

    <button ng-click="register()">Register</button>

    <p style="color:red">{{error}}</p>
    <p style="color:green">{{success}}</p>

</form>

<script>
var app = angular.module("examApp", []);

app.controller("examCtrl", function($scope) {
    $scope.register = function() {
        if ($scope.examForm.$valid) {
            $scope.success = "Student Registered Successfully!";
            $scope.error = "";
        } else {
            $scope.error = "Please fill all details";
            $scope.success = "";
        }
    };
});
</script>

</body>
</html>
