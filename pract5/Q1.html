<!DOCTYPE html>
<html ng-app="empApp">
<head>
    <title>Employee Registration</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
</head>
<body ng-controller="empCtrl">

<h2>Employee Registration</h2>

<form name="empForm">

    Employee Name:
    <input type="text" ng-model="emp.name" required>
    <br><br>

    Email:
    <input type="email" ng-model="emp.email" required>
    <br><br>

    Mobile Number:
    <input type="text" ng-model="emp.mobile" required>
    <br><br>

    Department:
    <select ng-model="emp.dept" required>
        <option value="">Select</option>
        <option>HR</option>
        <option>IT</option>
        <option>Finance</option>
    </select>
    <br><br>

    <button ng-click="register()">Register</button>

    <p style="color:red">{{error}}</p>
    <p style="color:green">{{success}}</p>

</form>

<script>
var app = angular.module("empApp", []);

app.controller("empCtrl", function($scope) {

    $scope.register = function() {
        if ($scope.empForm.$valid) {
            $scope.success = "Employee Registered Successfully!";
            $scope.error = "";
        } else {
            $scope.error = "Please fill all employee details";
            $scope.success = "";
        }
    };

});
</script>

</body>
</html>
