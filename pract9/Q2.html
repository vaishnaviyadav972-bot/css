<!DOCTYPE html>
<html ng-app="keyApp">
<head>
    <title>AngularJS Keyboard Event</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
</head>

<body ng-controller="keyCtrl" style="text-align:center;">

<h2>Keyboard Event Demo</h2>

<input type="text" placeholder="Type here"
       ng-keypress="count = count + 1">

<p>Total Key Pressed: {{ count }}</p>

<script>
var app = angular.module("keyApp", []);

app.controller("keyCtrl", function($scope) {
    $scope.count = 0;
});
</script>

</body>
</html>
