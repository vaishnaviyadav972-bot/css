<!DOCTYPE html>
<html>
<head>
    <title>Document Write Formatting</title>
</head>
<body>

<script>
    document.write("<b>Bold Text</b><br>");
    document.write("<i>Italic Text</i><br>");
    document.write("<u>Underlined Text</u><br>");
    document.write("<font color='blue'>Blue Colored Text</font><br>");
    document.write("<h2>Heading Text</h2>");
</script>

</body>
</html>
